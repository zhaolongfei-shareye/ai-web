<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hub Pro - Full Stack Hub & Token Economy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#4F46E5' } } } }
    </script>
    <style>
        .card-hover { transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .star-fill { color: #fbbf24; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-300 min-h-screen text-gray-800 dark:text-gray-100">
    
    <div class="flex flex-col lg:flex-row min-h-screen">
        
        <aside class="w-full lg:w-80 bg-white dark:bg-gray-800 border-b lg:border-b-0 lg:border-r border-gray-200 dark:border-gray-700 p-5 flex flex-col justify-between shrink-0 lg:sticky lg:top-0 lg:h-screen overflow-y-auto">
            <div>
                <div class="flex items-center gap-3 border-b dark:border-gray-700 pb-4 mb-4">
                    <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=150&q=80" alt="Avatar" class="w-11 h-11 rounded-full object-cover ring-2 ring-primary/50">
                    <div class="overflow-hidden">
                        <h2 class="font-black text-sm truncate text-gray-900 dark:text-white">Alex Mercer</h2>
                        <p class="text-[11px] text-primary font-semibold truncate">Premium AI Researcher</p>
                    </div>
                </div>

                <div class="bg-gray-50 dark:bg-gray-900/50 rounded-xl p-3 border dark:border-gray-700 mb-4 text-xs">
                    <h3 class="font-black text-[11px] uppercase tracking-wider text-gray-400 mb-2 flex items-center gap-1.5">
                        <i class="fa fa-id-card text-primary"></i> <span id="lblAccount">Account Center</span>
                    </h3>
                    <div class="mb-2.5">
                        <span class="text-[10px] text-gray-400 block mb-1" id="lblPaidList">Paid Agents:</span>
                        <div id="paidAgentsContainer" class="flex flex-wrap gap-1"></div>
                    </div>
                    <div class="space-y-1.5 border-t dark:border-gray-700 pt-2 text-[11px]">
                        <div class="flex justify-between">
                            <span class="text-gray-400" id="lblTokenTotal">Total Deposited:</span>
                            <span class="font-mono font-bold" id="valTokenTotal">0</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-400" id="lblTokenUsed">Consumed:</span>
                            <span class="font-mono text-gray-500" id="valTokenUsed">0</span>
                        </div>
                        <div class="flex justify-between bg-primary/5 dark:bg-primary/20 p-1 rounded">
                            <span class="font-medium text-primary dark:text-indigo-300" id="lblTokenLeft">Balance:</span>
                            <span class="font-mono font-black text-primary dark:text-indigo-300" id="valTokenLeft">0</span>
                        </div>
                    </div>
                    <button onclick="openTopupModal()" class="w-full mt-2.5 bg-primary hover:bg-indigo-700 text-white py-1.5 rounded-lg font-bold text-[11px] transition flex items-center justify-center gap-1">
                        <i class="fa fa-bolt"></i> <span id="btnTopupEntry">Top-up Balance</span>
                    </button>
                </div>
                
                <div class="border-t dark:border-gray-700 pt-3">
                    <h3 class="text-[11px] font-black tracking-wider text-gray-400 uppercase mb-2 flex items-center justify-between">
                        <span id="lblFavs">My Bookmarks</span>
                        <span id="favCount" class="bg-red-500 text-white px-2 py-0.2 rounded-full text-[9px] font-bold">0</span>
                    </h3>
                    <div id="categorizedFavorites" class="space-y-2 text-xs"></div>
                </div>
            </div>

            <div class="pt-4 border-t dark:border-gray-700 mt-4 flex items-center justify-between text-[10px] text-gray-400">
                <span>Core Ecosystem v4.0</span>
                <button id="themeToggle" class="p-1.5 rounded-lg bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 hover:opacity-80 transition">
                    <i class="fa fa-moon-o dark:hidden"></i><i class="fa fa-sun-o hidden dark:inline"></i>
                </button>
            </div>
        </aside>

        <main class="flex-1 p-4 md:p-6 overflow-x-hidden">
            <header class="flex flex-col sm:flex-row justify-between items-center mb-5 pb-5 border-b dark:border-gray-800 gap-3">
                <div class="flex flex-col md:flex-row items-center gap-3">
                    <h1 class="text-xl font-black text-gray-900 dark:text-white flex items-center gap-2 cursor-pointer" onclick="backToMainDashboard()">
                        <i class="fa fa-cubes text-primary"></i> <span id="navTitle">AI Matrix Hub</span>
                    </h1>
                    <div class="flex rounded-lg bg-gray-200/70 dark:bg-gray-800 p-0.5 border dark:border-gray-700" id="langSelectorTabs">
                        <button onclick="switchLang('en')" data-lang="en" class="px-2 py-0.5 text-xs font-bold rounded-md transition-all">EN</button>
                        <button onclick="switchLang('zh')" data-lang="zh" class="px-2 py-0.5 text-xs font-bold rounded-md transition-all">中文</button>
                        <button onclick="switchLang('ja')" data-lang="ja" class="px-2 py-0.5 text-xs font-bold rounded-md transition-all">日本語</button>
                        <button onclick="switchLang('ko')" data-lang="ko" class="px-2 py-0.5 text-xs font-bold rounded-md transition-all">한국어</button>
                    </div>
                </div>
                
                <div class="flex items-center gap-2">
                    <button id="openAdminBtn" class="bg-gray-800 dark:bg-gray-200 text-white dark:text-gray-800 px-3 py-1.5 rounded-lg hover:opacity-90 transition text-xs font-bold flex items-center gap-1">
                        <i class="fa fa-cog"></i> <span id="btnAdmin">Admin</span>
                    </button>
                    <button id="openCompareBtn" class="bg-primary hover:bg-indigo-700 text-white px-3 py-1.5 rounded-lg hidden transition text-xs font-bold flex items-center gap-1">
                        <i class="fa fa-exchange"></i> <span id="btnCompare">Compare</span>
                    </button>
                </div>
            </header>

            <div id="dashboardViewBlock">
                <div class="flex flex-wrap gap-1.5 mb-5" id="filterTabs"></div>
                <div class="grid sm:grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5" id="toolContainer"></div>
            </div>

            <div id="detailViewBlock" class="hidden bg-white dark:bg-gray-800 rounded-xl p-5 border border-gray-200 dark:border-gray-700 shadow-sm max-w-3xl mx-auto"></div>
        </main>
    </div>

    <div id="topupModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 rounded-xl w-full max-w-lg p-5 shadow-2xl overflow-y-auto max-h-[95vh]">
            <div class="flex justify-between items-center mb-4 border-b dark:border-gray-700 pb-2.5">
                <h2 class="text-base font-black dark:text-white flex items-center gap-2 text-primary">
                    <i class="fa fa-credit-card"></i> <span id="popTopupTitle">Secure VISA Gateway</span>
                </h2>
                <button onclick="closeTopupModal()" class="text-gray-400 hover:text-red-500 text-xl font-bold">&times;</button>
            </div>
            
            <div class="space-y-3.5 text-xs">
                <div>
                    <label class="block font-bold text-gray-700 dark:text-gray-300 mb-1" id="lblPopAgent">Target Agent / Core Wallet</label>
                    <select id="popSelectAgent" class="w-full p-2 border rounded-lg bg-gray-50 dark:bg-gray-700 dark:text-white dark:border-gray-600 outline-none">
                        <option value="0">Global Platform Wallet (Universal Token)</option>
                    </select>
                </div>

                <div>
                    <label class="block font-bold text-gray-700 dark:text-gray-300 mb-1" id="lblPopContent">Billing Content</label>
                    <div class="grid grid-cols-2 gap-2">
                        <label class="p-2 border rounded-lg flex items-center gap-2 cursor-pointer bg-gray-50 dark:bg-gray-700 dark:border-gray-600">
                            <input type="radio" name="popBillingType" value="token" checked onclick="toggleBillingType('token')">
                            <div><strong class="block text-[11px]">Token Top-up</strong><span class="text-[9px] text-gray-400">Pay as you go</span></div>
                        </label>
                        <label class="p-2 border rounded-lg flex items-center gap-2 cursor-pointer bg-gray-50 dark:bg-gray-700 dark:border-gray-600">
                            <input type="radio" name="popBillingType" value="sub" onclick="toggleBillingType('sub')">
                            <div><strong class="block text-[11px]">Premium Pass</strong><span class="text-[9px] text-gray-400">Monthly Tier Plan</span></div>
                        </label>
                    </div>
                </div>

                <div id="tokenAmountArea">
                    <label class="block font-bold text-gray-700 dark:text-gray-300 mb-1" id="lblPopPack">Select Purchase Tier Amount</label>
                    <div class="grid grid-cols-3 gap-2" id="topupPackageGrid">
                        <button onclick="selectPackagePrice(9.99, 5000000)" class="p-2.5 border rounded-lg text-left bg-gray-50 dark:bg-gray-700 dark:border-gray-600 hover:border-primary transition group active">
                            <span class="block font-black text-gray-900 dark:text-white">$9.99</span>
                            <span class="text-[10px] text-gray-400">5M Tokens</span>
                        </button>
                        <button onclick="selectPackagePrice(29.99, 20000000)" class="p-2.5 border rounded-lg text-left bg-gray-50 dark:bg-gray-700 dark:border-gray-600 hover:border-primary transition group relative">
                            <span class="absolute top-0 right-0 bg-red-500 text-white text-[8px] font-bold px-1 rounded-bl">Save 10%</span>
                            <span class="block font-black text-gray-900 dark:text-white">$29.99</span>
                            <span class="text-[10px] text-gray-400">20M Tokens</span>
                        </button>
                        <button onclick="selectPackagePrice(99.99, 80000000)" class="p-2.5 border rounded-lg text-left bg-gray-50 dark:bg-gray-700 dark:border-gray-600 hover:border-primary transition group relative">
                            <span class="absolute top-0 right-0 bg-red-500 text-white text-[8px] font-bold px-1 rounded-bl">Save 20%</span>
                            <span class="block font-black text-gray-900 dark:text-white">$99.99</span>
                            <span class="text-[10px] text-gray-400">80M Tokens</span>
                        </button>
                    </div>
                </div>

                <div class="bg-gray-50 dark:bg-gray-900/40 p-3 rounded-xl border dark:border-gray-700 space-y-2">
                    <div class="flex justify-between items-center mb-1">
                        <span class="font-bold text-gray-700 dark:text-gray-300 text-[11px]">Credit Card Information</span>
                        <div class="text-gray-400 space-x-1"><i class="fa fa-cc-visa text-blue-600 text-base"></i><i class="fa fa-cc-mastercard text-amber-500 text-base"></i></div>
                    </div>
                    <div>
                        <input type="text" placeholder="Cardholder Name" id="visaName" class="w-full p-2 border rounded bg-white dark:bg-gray-800 dark:text-white dark:border-gray-600 outline-none">
                    </div>
                    <div>
                        <div class="relative">
                            <input type="text" placeholder="Card Number (4000 1234 5678 9010)" id="visaNum" class="w-full p-2 pl-8 border rounded bg-white dark:bg-gray-800 dark:text-white dark:border-gray-600 outline-none font-mono">
                            <i class="fa fa-lock absolute left-2.5 top-3 text-gray-400"></i>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" placeholder="MM/YY" id="visaExpiry" class="p-2 border rounded bg-white dark:bg-gray-800 dark:text-white dark:border-gray-600 outline-none text-center font-mono">
                        <input type="password" placeholder="CVV / CVC" id="visaCvc" class="p-2 border rounded bg-white dark:bg-gray-800 dark:text-white dark:border-gray-600 outline-none text-center font-mono" maxlength="4">
                    </div>
                </div>

                <button onclick="executeVisaPaymentMock()" id="btnSubmitTopup" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-2.5 rounded-lg text-xs font-black transition shadow-md shadow-emerald-600/20">
                    Authorize & Secure Pay $9.99
                </button>
            </div>
        </div>
    </div>

    <div id="compareModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 rounded-xl w-full max-w-3xl max-h-[90vh] overflow-auto p-5 shadow-2xl">
            <div class="flex justify-between items-center mb-5 border-b dark:border-gray-700 pb-2">
                <h2 class="text-base font-bold dark:text-white flex items-center gap-2"><i class="fa fa-columns text-primary"></i> <span id="modalCompareTitle">Comparison</span></h2>
                <button id="closeCompare" class="text-gray-400 hover:text-red-500 text-xl">&times;</button>
            </div>
            <div class="grid md:grid-cols-2 gap-4" id="compareContent"></div>
            <div class="mt-6 text-center border-t dark:border-gray-700 pt-3">
                <button id="clearSelect" class="px-4 py-1.5 bg-red-500 text-white rounded-lg text-xs hover:bg-red-600 transition">Clear</button>
            </div>
        </div>
    </div>

    <div id="authModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 rounded-xl w-full max-w-sm p-5 shadow-2xl">
            <h3 class="text-sm font-bold mb-3 dark:text-white" id="authTitle">Admin Access</h3>
            <input type="password" id="authPassword" placeholder="Enter password (Default: 8888)" class="w-full p-2 border rounded-lg mb-3 bg-transparent dark:text-white dark:border-gray-600 text-xs">
            <div class="flex justify-end gap-2 text-xs">
                <button id="closeAuth" class="px-3 py-1.5 bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-white rounded-lg">Cancel</button>
                <button onclick="verifyPassword()" class="px-3 py-1.5 bg-primary text-white rounded-lg">Verify</button>
            </div>
        </div>
    </div>

    <div id="adminModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 rounded-xl w-full max-w-2xl max-h-[90vh] overflow-auto p-5 shadow-2xl">
            <div class="flex justify-between items-center mb-4 border-b dark:border-gray-700 pb-2">
                <h2 class="text-base font-bold dark:text-white flex items-center gap-2"><i class="fa fa-dashboard text-primary"></i> <span id="modalAdminTitle">Management Console</span></h2>

            </div>
            
            <div class="bg-gray-50 dark:bg-gray-700/50 p-3 rounded-xl mb-4 grid sm:grid-cols-2 gap-2 border dark:border-gray-600 text-xs">
                <input type="hidden" id="toolId">
                <input type="text" id="toolName" placeholder="Asset Name" class="p-2 border rounded bg-white dark:bg-gray-800 dark:text-white dark:border-gray-600">
                <select id="toolCategory" class="p-2 border rounded bg-white dark:bg-gray-800 dark:text-white dark:border-gray-600">
                    <option value="chat">Dialogue & Chat</option>
                    <option value="search">Search & Digest</option>
                    <option value="office">Office & Data</option>
                    <option value="code">Coding Assistant</option>
                    <option value="study">Study & Consultant</option>
                    <option value="image">Creative Design</option>
                </select>
                <input type="text" id="toolPrice" placeholder="Pricing standard (e.g. Free)" class="p-2 border rounded bg-white dark:bg-gray-800 dark:text-white dark:border-gray-600">
                <input type="text" id="toolLink" placeholder="URL Website (https://...)" class="p-2 border rounded bg-white dark:bg-gray-800 dark:text-white dark:border-gray-600">
                <div class="sm:col-span-2 text-right"><button onclick="saveTool()" class="bg-primary text-white px-4 py-1.5 rounded-lg text-xs" id="btnSaveTool">Save</button></div>
            </div>
            <div class="overflow-x-auto text-xs"><table class="w-full text-left border-collapse dark:text-white"><tbody id="adminTableBody"></tbody></table></div>
        </div>
    </div>

                }

                // Commit back to system disk clusters
                localStorage.setItem('portal_wallet', JSON.stringify(tokenWallet));
                
                // Refresh views reactive loops
                payBtn.disabled = false;
                payBtn.innerText = origText;

                ['visaName', 'visaNum', 'visaExpiry', 'visaCvc'].forEach(id => document.getElementById(id).value = '');

        }

            if (!tool) return;
            
            const t = i18n[currentLang];
            const isFav = selectedFavs.includes(tool.id);
            const youtubeLink = `https://www.youtube.com/results?search_query=${encodeURIComponent(tool.name + ' ' + t.ytQuery)}`;
            const displayImg = tool.img || "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=800&q=80";

            const localizedDesc = tool.desc[currentLang] || tool.desc['en'] || tool.desc;
            const localizedPrice = tool.price[currentLang] || tool.price['en'] || tool.price;
            
            const arrayPros = (tool.pros && tool.pros[currentLang]) ? tool.pros[currentLang] : ["Premium features validated."];
            const arrayCons = (tool.cons && tool.cons[currentLang]) ? tool.cons[currentLang] : ["Check data billing constraints."];
            const sandboxPrompt = tool.prompt || "Analyze system asset schema arrays.";

            detailViewBlock.dataset.activeId = tool.id;
            dashboardViewBlock.classList.add("hidden");
            detailViewBlock.classList.remove("hidden");
            window.scrollTo({ top: 0, behavior: 'smooth' });

            let html = `
                <div class="flex items-center justify-between mb-4">
                    <button onclick="backToMainDashboard()" class="text-xs font-bold text-gray-500 dark:text-gray-400 hover:text-primary flex items-center gap-1.5">
                        <i class="fa fa-arrow-left"></i> ${t.back}
                    </button>
                    <button onclick="toggleFavorite(${tool.id}, event)" class="flex items-center gap-1.5 text-xs font-bold px-2.5 py-1 rounded-lg border transition ${isFav ? 'bg-red-50 dark:bg-red-950/20 text-red-500 border-red-200' : 'border-gray-200 dark:border-gray-700 text-gray-500'}">
                        <i class="fa ${isFav ? 'fa-heart' : 'fa-heart-o'}"></i> ${isFav ? 'Bookmarked' : 'Add Bookmarks'}
                    </button>
                </div>

                <div class="relative w-full h-44 rounded-xl overflow-hidden border dark:border-gray-700 mb-4 bg-gray-900 shadow-inner">
                    <img src="${displayImg}" alt="${tool.name}" class="w-full h-full object-cover opacity-75">
                    <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/90 to-transparent p-5">
                        <span class="text-[9px] bg-primary text-white font-extrabold uppercase tracking-wider px-2 py-0.5 rounded-full w-max mb-1.5 block">${t[tool.category] || tool.category}</span>
                        <h2 class="text-xl sm:text-2xl font-black text-white">${tool.name}</h2>
                    </div>
                </div>

                <div class="grid sm:grid-cols-2 gap-3 mb-4 text-xs bg-gray-50 dark:bg-gray-700/40 p-3 rounded-xl border dark:border-gray-700">
                    <div><span class="text-gray-400 block text-[10px]">${t.pricing}</span><span class="font-bold text-gray-900 dark:text-white">${localizedPrice}</span></div>
                    <div><span class="text-gray-400 block text-[10px]">Benchmark Infrastructure Score</span><span class="font-bold text-gray-900 dark:text-white flex items-center gap-1">${renderStar(tool.score)} (${tool.score.toFixed(1)})</span></div>
                </div>

                <div class="mb-4"><p class="text-xs leading-relaxed text-gray-600 dark:text-gray-300">${localizedDesc}</p></div>

                <div class="grid md:grid-cols-2 gap-3 mb-4">
                    <div class="bg-emerald-50/40 dark:bg-emerald-950/10 p-3 rounded-xl border border-emerald-100 dark:border-emerald-900/30">
                        <h4 class="text-[11px] font-black uppercase text-emerald-600 dark:text-emerald-400 mb-1 flex items-center gap-1"><i class="fa fa-check-circle"></i> ${t.pros}</h4>
                        <ul class="space-y-0.5 text-xs text-gray-600 dark:text-gray-300">
                            ${arrayPros.map(p => `<li><i class="fa fa-caret-right text-emerald-400 mr-1"></i>${p}</li>`).join('')}
                        </ul>
                    </div>
                    <div class="bg-rose-50/40 dark:bg-rose-950/10 p-3 rounded-xl border border-rose-100 dark:border-rose-900/30">
                        <h4 class="text-[11px] font-black uppercase text-rose-600 dark:text-rose-400 mb-1 flex items-center gap-1"><i class="fa fa-times-circle"></i> ${t.cons}</h4>
                        <ul class="space-y-0.5 text-xs text-gray-600 dark:text-gray-300">
                            ${arrayCons.map(c => `<li><i class="fa fa-caret-right text-rose-400 mr-1"></i>${c}</li>`).join('')}
                        </ul>
                    </div>
                </div>

                <div class="bg-gray-100 dark:bg-gray-700/30 rounded-xl p-3 border dark:border-gray-700 mb-5">
                    <div class="flex justify-between items-center mb-1.5">
                        <h4 class="text-[10px] font-black text-gray-400 uppercase flex items-center gap-1"><i class="fa fa-terminal text-primary"></i> ${t.promptTitle}</h4>
                        <button onclick="copyPromptText(this, \`${encodeURIComponent(sandboxPrompt)}\`)" class="text-[9px] bg-white dark:bg-gray-800 border px-1.5 py-0.5 rounded shadow-sm font-bold text-primary">${t.copy}</button>
                    </div>
                    <code class="block text-xs text-gray-700 dark:text-gray-300 font-mono break-all bg-white dark:bg-gray-900/40 p-2 border dark:border-gray-700 rounded select-all">${sandboxPrompt}</code>
                </div>

                <div class="grid grid-cols-2 gap-3 pb-5 border-b dark:border-gray-700">
                    <a href="${tool.link}" target="_blank" class="w-full text-center py-2.5 rounded-lg text-xs font-black bg-gray-100 dark:bg-gray-700 text-gray-800 dark:text-gray-200 hover:bg-primary hover:text-white transition flex items-center justify-center gap-1">${t.visit} <i class="fa fa-external-link"></i></a>
                    <a href="${youtubeLink}" target="_blank" class="w-full text-center py-2.5 rounded-lg text-xs font-black bg-red-50 dark:bg-red-950/30 text-red-600 dark:text-red-400 hover:bg-red-600 hover:text-white transition flex items-center justify-center gap-1"><i class="fa fa-youtube-play"></i> ${t.course}</a>
                </div>

                <div class="mt-6">
                    <h3 class="text-sm font-black dark:text-white mb-3 flex items-center gap-1.5"><i class="fa fa-comments-o text-primary"></i> ${t.reviewTitle}</h3>
                    <div id="reviewsStreamBlock" class="space-y-2.5 mb-4"></div>

                    <div class="bg-gray-50 dark:bg-gray-700/30 p-3 rounded-xl border dark:border-gray-700">
                        <div class="flex flex-col sm:flex-row gap-2 items-start sm:items-center mb-2">
                            <input type="text" id="reviewerName" placeholder="${t.namePlaceholder}" class="p-2 text-xs border rounded-lg bg-white dark:bg-gray-800 dark:text-white dark:border-gray-600 outline-none w-full sm:w-40">
                            <div class="flex items-center gap-1" id="starPickerContainer"></div>
                        </div>
                        <textarea id="reviewerComment" rows="2" placeholder="${t.commentPlaceholder}" class="w-full p-2 text-xs border rounded-lg bg-white dark:bg-gray-800 dark:text-white dark:border-gray-600 outline-none focus:border-primary mb-2"></textarea>
                        <div class="text-right">
                            <button onclick="submitNewReview(${tool.id})" class="px-3 py-1.5 bg-primary text-white text-xs font-bold rounded-lg transition">${t.submitReview}</button>
                        </div>
                    </div>
                </div>
            `;
            
            detailViewBlock.innerHTML = html;
            renderStarsFormPicker();
            renderActiveToolReviews(tool.id);
        }

        function backToMainDashboard() {
            detailViewBlock.classList.add("hidden");
            detailViewBlock.removeAttribute("data-activeId");
            dashboardViewBlock.classList.remove("hidden");
        }

        function copyPromptText(button, textEncoded) {
            navigator.clipboard.writeText(decodeURIComponent(textEncoded)).then(() => {
                const orig = button.innerText;
                button.innerText = i18n[currentLang].copied || "Copied!";
                setTimeout(() => button.innerText = orig, 1500);
            });
        }

        function renderStarsFormPicker() {
            const container = document.getElementById("starPickerContainer");
            if(!container) return;
            container.innerHTML = "";
            for(let i=1; i<=5; i++) {
                const star = document.createElement("i");
                star.className = `fa cursor-pointer transition text-sm ${i <= activeReviewStars ? 'fa-star text-amber-500' : 'fa-star-o text-gray-300 dark:text-gray-600'}`;
                star.onclick = () => { activeReviewStars = i; renderStarsFormPicker(); };
                container.appendChild(star);
            }
        }

        function renderActiveToolReviews(toolId) {
            const feed = document.getElementById("reviewsStreamBlock");
            if(!feed) return;
            feed.innerHTML = "";
            const currentList = reviewsDb[toolId] || [];

            if(currentList.length === 0) {
                feed.innerHTML = `<p class="text-[11px] text-center text-gray-400 dark:text-gray-500 py-4">${i18n[currentLang].noReviews}</p>`;
                return;
            }

            currentList.forEach(rev => {
                const bubble = document.createElement("div");
                bubble.className = "bg-white dark:bg-gray-800/40 p-3 rounded-xl border border-gray-100 dark:border-gray-700/60 shadow-sm flex gap-2.5";
                bubble.innerHTML = `
                    <div class="w-7 h-7 rounded-full bg-primary/10 text-primary font-bold flex items-center justify-center text-[10px] shrink-0 uppercase">${rev.name.substring(0,2)}</div>
                    <div class="flex-1 min-w-0 text-xs">
                        <div class="flex justify-between items-center mb-0.5">
                            <span class="font-black text-gray-900 dark:text-white truncate">${rev.name}</span>
                            <span class="text-[9px] text-gray-400 font-mono">${rev.date}</span>
                        </div>
                        <div class="flex mb-1">${renderStar(rev.score)}</div>
                        <p class="text-gray-600 dark:text-gray-300 break-words">${rev.text}</p>
                    </div>
                `;
                feed.appendChild(bubble);
            });
        }

        function submitNewReview(toolId) {
            const nameInp = document.getElementById("reviewerName");
            const textInp = document.getElementById("reviewerComment");
            const name = nameInp.value.trim();
            const text = textInp.value.trim();
            if(!name || !text) { alert(i18n[currentLang].alertComment); return; }

            const now = new Date();
            const timeStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

            if(!reviewsDb[toolId]) reviewsDb[toolId] = [];
            reviewsDb[toolId].push({ name, score: activeReviewStars, text, date: timeStr });
            localStorage.setItem('portal_reviews', JSON.stringify(reviewsDb));

            const tool = aiTools.find(x => x.id === toolId);
            if(tool) {
                const totalScore = reviewsDb[toolId].reduce((acc, c) => acc + c.score, 0);
                tool.score = totalScore / reviewsDb[toolId].length;
                localStorage.setItem('portal_tools', JSON.stringify(aiTools));
            }

            nameInp.value = ""; textInp.value = ""; activeReviewStars = 5;
            renderStarsFormPicker();
            renderActiveToolReviews(toolId);
            renderCategorizedFavorites();
            renderTools();
        }

        function toggleFavorite(id, event) {
            if(event) event.stopPropagation();
            if (selectedFavs.includes(id)) {
                selectedFavs = selectedFavs.filter(favId => favId !== id);
            } else { selectedFavs.push(id); }
            localStorage.setItem('portal_favs', JSON.stringify(selectedFavs));
            renderCategorizedFavorites();
            renderTools();
            if(!detailViewBlock.classList.contains("hidden") && parseInt(detailViewBlock.dataset.activeId) === id) {
                navigateToDetails(id);
            }
        }

        function handleSelectCompare(e){
            const id = parseInt(e.target.dataset.id);
            if(e.target.checked){
                if(selectedCompare.length >= 2) { alert(i18n[currentLang].alertSelectLimit); e.target.checked = false; return; }
                selectedCompare.push(aiTools.find(t=>t.id === id));
            } else { selectedCompare = selectedCompare.filter(item=>item.id !== id); }
            renderTools();
        }

        // Administrative Auth Gateway
        document.getElementById("openAdminBtn").addEventListener("click", () => {
            if(sessionStorage.getItem("admin_authenticated") === "true") { openAdminConsole(); } 
            else { document.getElementById("authPassword").value = ""; authModal.classList.replace("hidden", "flex"); }
        });
        document.getElementById("closeAuth").addEventListener("click", () => authModal.classList.replace("flex", "hidden"));
        
        function verifyPassword() {
            if(document.getElementById("authPassword").value === "8888") {
                sessionStorage.setItem("admin_authenticated", "true");
                authModal.classList.replace("flex", "hidden");
                openAdminConsole();
            } else { alert(i18n[currentLang].alertPass); }
        }
        function logoutAdmin() { sessionStorage.removeItem("admin_authenticated"); adminModal.classList.replace("flex", "hidden"); }
        function openAdminConsole() { renderAdminTable(); adminModal.classList.replace("hidden", "flex"); }

        function renderAdminTable() {
            adminTableBody.innerHTML = "";
            const t = i18n[currentLang];
            aiTools.forEach(tool=>{
                const tr = document.createElement('tr');
                tr.className = "border-b dark:border-b-gray-700 text-xs";
                tr.innerHTML = `
                    <td class="p-2 font-bold">${tool.name}</td>
                    <td class="p-2"><span class="bg-gray-100 dark:bg-gray-600 px-1.5 py-0.2 rounded text-[9px] font-bold">${t[tool.category] || tool.category}</span></td>
                    <td class="p-2 text-right"><button onclick="deleteTool(${tool.id})" class="text-red-500 font-bold hover:underline">Delete</button></td>
                `;
                adminTableBody.appendChild(tr);
            });
        }

        function saveTool() {
            const nameVal = document.getElementById('toolName').value.trim();
            const linkVal = document.getElementById('toolLink').value.trim();
            if(!nameVal || !linkVal) return alert(i18n[currentLang].alertFields);

            aiTools.push({
                id: Date.now(), name: nameVal, category: document.getElementById('toolCategory').value, score: 5.0, icon: "fa-cube", link: linkVal,
                price: { en: document.getElementById('toolPrice').value || "Free", zh: document.getElementById('toolPrice').value || "免费" },
                desc: { en: "Custom assets deployment setup.", zh: "后台自定义配置注入的全新AI智能体资产实例。" },
                pros: { zh: ["高阶自定义灵活部署"] }, cons: { zh: ["暂无大规模公开评测"] }, prompt: 'Execute matrix tracking pipeline arrays:'
            });
            localStorage.setItem('portal_tools', JSON.stringify(aiTools));
            updateUIStrings();
            renderAdminTable();
            ['toolName','toolPrice','toolLink'].forEach(id => document.getElementById(id).value = '');
        }

        function deleteTool(id) {
            if(!confirm(i18n[currentLang].confirmDel)) return;
            aiTools = aiTools.filter(item => item.id !== id);
            selectedFavs = selectedFavs.filter(favId => favId !== id);
            tokenWallet.paidAgents = tokenWallet.paidAgents.filter(paidId => paidId !== id);
            localStorage.setItem('portal_tools', JSON.stringify(aiTools));
            localStorage.setItem('portal_favs', JSON.stringify(selectedFavs));
            localStorage.setItem('portal_wallet', JSON.stringify(tokenWallet));
            updateUIStrings();
            renderAdminTable();
            if(!detailViewBlock.classList.contains("hidden") && parseInt(detailViewBlock.dataset.activeId) === id) { backToMainDashboard(); }
        }

        // Compare Panels Logic mapping
        openCompareBtn.addEventListener("click", ()=>{
            compareContent.innerHTML = "";
            selectedCompare.forEach(tool=>{
                const card = document.createElement("div");
                card.className = "bg-gray-50 dark:bg-gray-700/50 p-4 rounded-xl border dark:border-gray-600 text-xs";
                card.innerHTML = `<h3 class="font-bold mb-1 dark:text-white text-sm">${tool.name}</h3><p class="text-gray-500">Score Benchmark: ${tool.score.toFixed(1)}</p>`;
                compareContent.appendChild(card);
            });
            compareModal.classList.replace("hidden", "flex");
        });
        document.getElementById("closeCompare").addEventListener("click", ()=>compareModal.classList.replace("flex", "hidden"));
        document.getElementById("clearSelect").addEventListener("click", ()=>{ selectedCompare = []; compareModal.classList.replace("flex", "hidden"); renderTools(); });

        // Dark/Light Theme Layer Trigger
        if(localStorage.getItem("theme") === "dark") document.documentElement.classList.add("dark");
        document.getElementById("themeToggle").addEventListener("click", ()=>{
            document.documentElement.classList.toggle("dark");
            localStorage.setItem("theme", document.documentElement.classList.contains("dark") ? "dark" : "light");
        });

        // Initialize Application Shell Lifecycle
        renderLangSelectorUI();
        updateUIStrings();
    </script>
</body>
</html>
