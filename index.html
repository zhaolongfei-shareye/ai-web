<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tools Comparison Portal Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#4F46E5' } } } }
    </script>
    <style>
        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-6px); box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.15); }
        .star-fill { color: #fbbf24; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-300 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-7xl">
        <header class="flex flex-col lg:flex-row justify-between items-center mb-8 gap-6 border-b dark:border-gray-800 pb-6">
            <div class="flex flex-col md:flex-row items-center gap-4 text-center md:text-left">
                <h1 class="text-2xl md:text-3xl font-black text-gray-800 dark:text-white flex items-center gap-2">
                    <i class="fa fa-rocket text-primary animate-bounce"></i> <span id="navTitle">AI Tools Hub</span>
                </h1>
                <div class="flex rounded-lg bg-gray-200/70 dark:bg-gray-800 p-1 border dark:border-gray-700" id="langSelectorTabs">
                    <button onclick="switchLang('en')" data-lang="en" class="px-3 py-1.5 text-xs font-bold rounded-md transition-all">EN</button>
                    <button onclick="switchLang('zh')" data-lang="zh" class="px-3 py-1.5 text-xs font-bold rounded-md transition-all">中文</button>
                    <button onclick="switchLang('ja')" data-lang="ja" class="px-3 py-1.5 text-xs font-bold rounded-md transition-all">日本語</button>
                    <button onclick="switchLang('ko')" data-lang="ko" class="px-3 py-1.5 text-xs font-bold rounded-md transition-all">한국어</button>
                </div>
            </div>
            
            <div class="flex items-center gap-3">
                <button id="themeToggle" class="p-2.5 rounded-lg bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-white text-sm hover:opacity-80 transition">
                    <i class="fa fa-moon-o dark:hidden"></i><i class="fa fa-sun-o hidden dark:inline"></i>
                </button>
                <button id="openAdminBtn" class="bg-gray-800 dark:bg-gray-200 text-white dark:text-gray-800 px-4 py-2 rounded-lg hover:opacity-90 transition text-sm font-semibold flex items-center gap-1.5">
                    <i class="fa fa-cog"></i> <span id="btnAdmin">Admin</span>
                </button>
                <button id="openCompareBtn" class="bg-primary hover:bg-indigo-700 text-white px-5 py-2 rounded-lg hidden transition shadow-lg shadow-indigo-500/30 text-sm font-bold flex items-center gap-1.5">
                    <i class="fa fa-exchange"></i> <span id="btnCompare">Compare</span>
                </button>
            </div>
        </header>

        <div class="flex flex-wrap gap-2 mb-8" id="filterTabs"></div>

        <div class="grid sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="toolContainer"></div>
    </div>

    <div id="compareModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 rounded-xl w-full max-w-4xl max-h-[90vh] overflow-auto p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-6 border-b dark:border-gray-700 pb-3">
                <h2 class="text-xl font-bold dark:text-white flex items-center gap-2"><i class="fa fa-columns text-primary"></i> <span id="modalCompareTitle">Comparison</span></h2>
                <button id="closeCompare" class="text-gray-400 hover:text-red-500 text-2xl">&times;</button>
            </div>
            <div class="grid md:grid-cols-2 gap-6" id="compareContent"></div>
            <div class="mt-8 text-center border-t dark:border-gray-700 pt-4">
                <button id="clearSelect" class="px-5 py-2 bg-red-500 text-white rounded-lg text-sm hover:bg-red-600 transition">Clear</button>
            </div>
        </div>
    </div>

    <div id="authModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 rounded-xl w-full max-w-md p-6 shadow-2xl">
            <h3 class="text-lg font-bold mb-4 dark:text-white" id="authTitle">Admin Access</h3>
            <input type="password" id="authPassword" placeholder="Enter password (Default: 8888)" class="w-full p-2.5 border rounded-lg mb-4 bg-transparent dark:text-white dark:border-gray-600 outline-none focus:border-primary text-sm">
            <div class="flex justify-end gap-2">
                <button id="closeAuth" class="px-4 py-2 text-sm bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-white rounded-lg">Cancel</button>
                <button onclick="verifyPassword()" class="px-4 py-2 text-sm bg-primary text-white rounded-lg hover:opacity-90">Verify</button>
            </div>
        </div>
    </div>

    <div id="adminModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 rounded-xl w-full max-w-4xl max-h-[90vh] overflow-auto p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-4 border-b dark:border-gray-700 pb-3">
                <h2 class="text-xl font-bold dark:text-white flex items-center gap-2"><i class="fa fa-dashboard text-primary"></i> <span id="modalAdminTitle">Management Console</span></h2>
                <div class="flex items-center gap-3">
                    <button onclick="logoutAdmin()" class="text-xs text-red-500 border border-red-500/30 px-2 py-1 rounded hover:bg-red-500 hover:text-white transition">Logout</button>
                    <button id="closeAdmin" class="text-gray-400 hover:text-red-500 text-2xl">&times;</button>
                </div>
            </div>
            
            <div class="bg-gray-50 dark:bg-gray-700/50 p-4 rounded-xl mb-6 grid sm:grid-cols-3 gap-3 border dark:border-gray-600 text-sm">
                <input type="hidden" id="toolId">
                <div class="flex flex-col"><label class="dark:text-gray-300 mb-1 text-xs">Name</label><input type="text" id="toolName" class="p-2 border rounded bg-white dark:bg-gray-800 dark:text-white dark:border-gray-600"></div>
                <div class="flex flex-col"><label class="dark:text-gray-300 mb-1 text-xs">Category</label><select id="toolCategory" class="p-2 border rounded bg-white dark:bg-gray-800 dark:text-white dark:border-gray-600"><option value="chat">Dialogue & Chat</option><option value="image">Image Generation</option><option value="video">Video Generation</option><option value="code">Coding Assistant</option></select></div>
                <div class="flex flex-col"><label class="dark:text-gray-300 mb-1 text-xs">Score (0-5.0)</label><input type="number" step="0.1" id="toolScore" class="p-2 border rounded bg-white dark:bg-gray-800 dark:text-white dark:border-gray-600"></div>
                <div class="flex flex-col"><label class="dark:text-gray-300 mb-1 text-xs">Pricing Module</label><input type="text" id="toolPrice" class="p-2 border rounded bg-white dark:bg-gray-800 dark:text-white dark:border-gray-600"></div>
                <div class="flex flex-col sm:col-span-2"><label class="dark:text-gray-300 mb-1 text-xs">URL Website</label><input type="text" id="toolLink" placeholder="https://..." class="p-2 border rounded bg-white dark:bg-gray-800 dark:text-white dark:border-gray-600"></div>
                <div class="flex flex-col sm:col-span-3"><label class="dark:text-gray-300 mb-1 text-xs">Description</label><textarea id="toolDesc" class="p-2 border rounded bg-white dark:bg-gray-800 dark:text-white dark:border-gray-600 h-16"></textarea></div>
                <div class="sm:col-span-3 text-right"><button onclick="saveTool()" class="bg-primary text-white px-5 py-2 rounded-lg hover:opacity-90" id="btnSaveTool">Save</button></div>
            </div>

            <div class="overflow-x-auto text-sm">
                <table class="w-full text-left border-collapse dark:text-white">
                    <thead>
                        <tr class="bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-200">
                            <th class="p-2.5 border dark:border-gray-600">Name</th>
                            <th class="p-2.5 border dark:border-gray-600">Category</th>
                            <th class="p-2.5 border dark:border-gray-600">Pricing</th>
                            <th class="p-2.5 border dark:border-gray-600 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Multi-Language Matrix Object Pack
        const i18n = {
            en: {
                title: "AI Matrix Hub", admin: "Admin", compare: "Compare", clear: "Clear Selection",
                pricing: "Pricing: ", visit: "Official Site", course: "Course", ytQuery: "tutorial", noTools: "No tools found.",
                sideTitle: "Side-by-Side Comparison", dataTitle: "Console Manager",
                all: "All Infrastructure", chat: "Dialogue & Chat", image: "Image Generation", video: "Video Generation", code: "Coding Assistant",
                authTitle: "System Security Authentication", saveBtn: "Save Asset", alertPass: "Access Denied: Invalid Password!",
                alertSelectLimit: "Restriction: Maximum 2 elements for side analytics.", alertFields: "Required attributes missing.",
                confirmDel: "Execute erasure protocol on this entity?", colName:"Name", colCat:"Category", colPrice:"Pricing", colAct:"Actions"
            },
            zh: {
                title: "AI 核心工具导航网", admin: "管理后台", compare: "对比选中", clear: "清空选择",
                pricing: "计算资费：", visit: "直达官网", course: "在线课程", ytQuery: "入门教学视频", noTools: "当前分类没有任何应用实例。",
                sideTitle: "双端性能指标并排对比", dataTitle: "云数据底座控制中心",
                all: "全部生态圈", chat: "文本大模型与对话", image: "创意图像生成", video: "高精视频生成", code: "编程与提效辅助",
                authTitle: "管理员最高安全级别验证", saveBtn: "将修改部署至本地", alertPass: "密码校验失败，请重试！",
                alertSelectLimit: "单次对比上限不得超过2个实例。", alertFields: "基础元数据关键行不可空缺。",
                confirmDel: "确定要彻底删除该工具的所有配置节点吗？", colName:"名称", colCat:"领域分类", colPrice:"资费标准", colAct:"操作单元"
            },
            ja: {
                title: "AIポータル比較ナビ", admin: "管理者ツール", compare: "比較する", clear: "選択クリア",
                pricing: "料金体系：", visit: "公式サイト", course: "オンライン講座", ytQuery: "使い方 講座", noTools: "該当データが存在しません。",
                sideTitle: "個別仕様・性能ベンチマーク比較", dataTitle: "マスターデータコントロール",
                all: "すべて表示", chat: "対話型AI & LLM", image: "画像生成プラットフォーム", video: "動画生成・編集", code: "プログラミング開発支援",
                authTitle: "管理者認証プロトコル", saveBtn: "データを保存する", alertPass: "パスワードが一致しません！",
                alertSelectLimit: "同時に比較できるのは2つのアイテムまでです。", alertFields: "名称およびURLアドレスは必須です。",
                confirmDel: "このAIツールの登録データを完全に抹消しますか？", colName:"ツール名", colCat:"カテゴリ", colPrice:"料金", colAct:"操作"
            },
            ko: {
                title: "AI 글로벌 비교 포털", admin: "관리자 모드", compare: "상세 비교", clear: "선택 초기화",
                pricing: "이용 요금：", visit: "공식 사이트", course: "무료 강좌", ytQuery: "기초 사용법", noTools: "해당 카테고리에 할당된 도구가 없습니다.",
                sideTitle: "양방향 핵심 인프라 스펙 비교", dataTitle: "클라우드 스토리지 허브 관리",
                all: "전체 에코시스템", chat: "대화형 모델 & 대규모 언어", image: "이미지 생성 및 디자인", video: "시네마틱 비디오 빌더", code: "코드 생성 및 자동화 지원",
                authTitle: "관리자 전용 자격 증명 창", saveBtn: "수정사항 동기화", alertPass: "액세스 거부: 암호가 올바르지 않습니다!",
                alertSelectLimit: "최대 2개의 도구 조합만 비교 분석을 지원합니다.", alertFields: "입력 필수 파라미터가 누락되었습니다.",
                confirmDel: "해당 데이터베이스 개체를 영구적으로 삭제하시겠습니까?", colName:"도구명", colCat:"분류", colPrice:"과금 체계", colAct:"액션 패널"
            }
        };

        // Complete Structured Static Data (Ensuring >=1 tool per type)
        const initDefaultTools = [
            // Dialogue
            { id:1, name:"ChatGPT", category:"chat", desc:"Flagship advanced large language model by OpenAI. Unmatched reasoning, creative drafting, and processing logic.", price:"Free / $20mo Plus", score:4.9, link:"https://openai.com" },
            { id:2, name:"Claude 3.5 Sonnet", category:"chat", desc:"Industry-leading LLM from Anthropic. Exceptional for source code architectures and advanced logical writing.", price:"Free / $20mo Pro", score:4.8, link:"https://anthropic.com" },
            { id:3, name:"Google Gemini", category:"chat", desc:"Google's native multimodal titan. Blazing fast data context reading with native access to live web intelligence ecosystem.", price:"Free / $20mo Advanced", score:4.7, link:"https://gemini.google.com" },
            // Image
            { id:4, name:"Midjourney", category:"image", desc:"The ultimate golden standard for text-to-image synthesis, cinematic composition framing, and artistic quality.", price:"Starts $10/mo", score:4.8, link:"https://www.midjourney.com" },
            { id:5, name:"Stable Diffusion XL", category:"image", desc:"Open-source framework giving creators infinite parameter controls, model custom finetuning, and extensions.", price:"Free / Self-Hosted", score:4.6, link:"https://stability.ai" },
            // Video
            { id:6, name:"Sora OpenAI", category:"video", desc:"State-of-the-art physics simulation engine creating 60-second highly coherent cinema fidelity scenes.", price:"Enterprise Access", score:4.9, link:"https://openai.com/sora" },
            { id:7, name:"Runway Gen-3 Alpha", category:"video", desc:"Major high-tier generative video generator built for cinematic rendering, hyper-realistic physics, and prompt fidelity.", price:"Subscription Base", score:4.5, link:"https://runwayml.com" },
            { id:8, name:"Luma Dream Machine", category:"video", desc:"High-speed continuous frame rendering engine delivering clean dynamic asset camera loops and fluid prompt motion.", price:"Free Quota / Paid", score:4.4, link:"https://lumalabs.ai" },
            // Coding
            { id:9, name:"GitHub Copilot", category:"code", desc:"The global developer standard inline autocompletion engine seamlessly running on IDE layers to accelerate production.", price:"$10/mo Individual", score:4.8, link:"https://github.com" },
            { id:10, name:"Cursor IDE", category:"code", desc:"An AI-first visual code workspace branch optimizing multi-file cross-referencing and background debugging automation.", price:"Free Tier / $20mo", score:4.9, link:"https://cursor.com" },
            { id:11, name:"v0 by Vercel", category:"code", desc:"Generative UI system rendering component code structures instantly from clean layout design prompts.", price:"Free Quota Base", score:4.7, link:"https://v0.dev" }
        ];

        let aiTools = JSON.parse(localStorage.getItem('portal_tools')) || initDefaultTools;
        let selectedCompare = [];
        let currentFilter = "all";

        const toolContainer = document.getElementById("toolContainer");
        const compareModal = document.getElementById("compareModal");
        const compareContent = document.getElementById("compareContent");
        const openCompareBtn = document.getElementById("openCompareBtn");
        const authModal = document.getElementById("authModal");
        const adminModal = document.getElementById("adminModal");
        const adminTableBody = document.getElementById("adminTableBody");
        const filterTabs = document.getElementById("filterTabs");

        function switchLang(langCode) {
            currentLang = langCode;
            localStorage.setItem('portal_lang', langCode);
            renderLangSelectorUI();
            updateUIStrings();
        }

        function renderLangSelectorUI() {
            document.querySelectorAll("#langSelectorTabs button").forEach(btn => {
                if(btn.dataset.lang === currentLang) {
                    btn.className = "px-3 py-1.5 text-xs font-black rounded-md bg-primary text-white shadow-sm";
                } else {
                    btn.className = "px-3 py-1.5 text-xs font-bold rounded-md text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white";
                }
            });
        }

        function updateUIStrings() {
            const t = i18n[currentLang];
            document.getElementById("navTitle").innerText = t.title;
            document.getElementById("btnAdmin").innerText = t.admin;
            document.getElementById("btnCompare").innerText = t.compare;
            document.getElementById("modalCompareTitle").innerText = t.sideTitle;
            document.getElementById("modalAdminTitle").innerText = t.dataTitle;
            document.getElementById("authTitle").innerText = t.authTitle;
            document.getElementById("btnSaveTool").innerText = t.saveBtn;
            document.getElementById("clearSelect").innerText = t.clear;

            renderFilterTabs();
            renderTools();
        }

        function renderFilterTabs() {
            const categories = ["all", "chat", "image", "video", "code"];
            filterTabs.innerHTML = "";
            categories.forEach(cat => {
                const btn = document.createElement("button");
                btn.className = `px-4 py-2 rounded-lg text-sm font-semibold transition ${currentFilter === cat ? 'bg-primary text-white shadow-md' : 'bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-white hover:bg-gray-300 dark:hover:bg-gray-600'}`;
                btn.innerText = i18n[currentLang][cat];
                btn.onclick = () => {
                    currentFilter = cat;
                    renderFilterTabs();
                    renderTools();
                };
                filterTabs.appendChild(btn);
            });
        }

        function renderStar(rating){
            let stars = "";
            for(let i=1;i<=5;i++){
                if(i <= Math.floor(rating)) stars += '<i class="fa fa-star star-fill mr-0.5"></i>';
                else if(i - rating < 1) stars += '<i class="fa fa-star-half-o star-fill mr-0.5"></i>';
                else stars += '<i class="fa fa-star-o text-gray-300 dark:text-gray-600 mr-0.5"></i>';
            }
            return stars;
        }

        function renderTools(){
            toolContainer.innerHTML = "";
            const t = i18n[currentLang];
            const filterData = currentFilter === "all" ? aiTools : aiTools.filter(item=>item.category === currentFilter);
            
            if(filterData.length === 0) {
                toolContainer.innerHTML = `<p class="col-span-full text-center text-gray-400 py-12">${t.noTools}</p>`;
                return;
            }

            filterData.forEach(tool=>{
                const isChecked = selectedCompare.find(s=>s.id === tool.id);
                // Dynamically build the YouTube deep link architecture search query parameter string
                const youtubeLink = `https://www.youtube.com/results?search_query=${encodeURIComponent(tool.name + ' ' + t.ytQuery)}`;
                
                const card = document.createElement("div");
                card.className = `card-hover bg-white dark:bg-gray-800 rounded-xl shadow-md p-5 border transition-all flex flex-col justify-between ${isChecked ? 'border-primary ring-2 ring-primary/20' : 'border-gray-100 dark:border-gray-700'}`;
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-3 gap-2">
                            <h3 class="text-md font-bold text-gray-800 dark:text-white">${tool.name}</h3>
                            <label class="cursor-pointer select-none">
                                <input type="checkbox" class="compare-checkbox hidden" data-id="${tool.id}" ${isChecked?"checked":""}>
                                <span class="px-2 py-0.5 text-[11px] rounded border transition font-bold ${isChecked ? 'bg-primary text-white border-primary' : 'border-gray-300 dark:border-gray-600 text-gray-500 dark:text-gray-400'}">${isChecked ? '✓' : '+ '+t.compare}</span>
                            </label>
                        </div>
                        <p class="text-xs text-gray-600 dark:text-gray-300 mb-4 min-h-[48px] line-clamp-3">${tool.desc}</p>
                        <div class="text-[11px] mb-2"><span class="text-gray-400">${t.pricing}</span><span class="dark:text-white font-medium">${tool.price}</span></div>
                    </div>
                    
                    <div class="flex flex-col gap-2 mt-3 pt-3 border-t dark:border-gray-700">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center text-xs">${renderStar(tool.score)}</div>
                            <span class="text-xs font-bold text-gray-400">${tool.score}</span>
                        </div>
                        <div class="grid grid-cols-2 gap-2 mt-1">
                            <a href="${tool.link}" target="_blank" class="text-center py-1.5 rounded-md text-xs font-bold bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 hover:bg-primary hover:text-white dark:hover:bg-primary dark:hover:text-white transition flex items-center justify-center gap-1">${t.visit} <i class="fa fa-external-link text-[10px]"></i></a>
                            <a href="${youtubeLink}" target="_blank" class="text-center py-1.5 rounded-md text-xs font-bold bg-red-50 dark:bg-red-950/30 text-red-600 dark:text-red-400 hover:bg-red-600 hover:text-white dark:hover:bg-red-600 dark:hover:text-white transition flex items-center justify-center gap-1"><i class="fa fa-youtube-play"></i> ${t.course}</a>
                        </div>
                    </div>
                `;
                toolContainer.appendChild(card);
            });
            document.querySelectorAll(".compare-checkbox").forEach(cb=>cb.addEventListener("change", handleSelectCompare));
            openCompareBtn.classList.toggle("hidden", selectedCompare.length !== 2);
        }

        function handleSelectCompare(e){
            const id = parseInt(e.target.dataset.id);
            if(e.target.checked){
                if(selectedCompare.length >= 2) { 
                    alert(i18n[currentLang].alertSelectLimit); 
                    e.target.checked = false; 
                    return; 
                }
                selectedCompare.push(aiTools.find(t=>t.id === id));
            } else {
                selectedCompare = selectedCompare.filter(item=>item.id !== id);
            }
            renderTools();
        }

        // Vault Access Logic
        document.getElementById("openAdminBtn").addEventListener("click", () => {
            if(sessionStorage.getItem("admin_authenticated") === "true") {
                openAdminConsole();
            } else {
                document.getElementById("authPassword").value = "";
                authModal.classList.replace("hidden", "flex");
            }
        });

        document.getElementById("closeAuth").addEventListener("click", () => authModal.classList.replace("flex", "hidden"));

        function verifyPassword() {
            const inputPass = document.getElementById("authPassword").value;
            if(inputPass === "8888") {
                sessionStorage.setItem("admin_authenticated", "true");
                authModal.classList.replace("hidden", "flex");
                openAdminConsole();
            } else {
                alert(i18n[currentLang].alertPass);
            }
        }

        function logoutAdmin() {
            sessionStorage.removeItem("admin_authenticated");
            adminModal.classList.replace("flex", "hidden");
        }

        function openAdminConsole() {
            renderAdminTable();
            adminModal.classList.replace("hidden", "flex");
        }

        // Control Matrix Node Engine
        function renderAdminTable() {
            adminTableBody.innerHTML = "";
            const t = i18n[currentLang];
            
            const thead = adminModal.querySelector("thead tr");
            thead.innerHTML = `
                <th class="p-2.5 border dark:border-gray-600">${t.colName}</th>
                <th class="p-2.5 border dark:border-gray-600">${t.colCat}</th>
                <th class="p-2.5 border dark:border-gray-600">${t.colPrice}</th>
                <th class="p-2.5 border dark:border-gray-600 text-center">${t.colAct}</th>
            `;

            aiTools.forEach(tool=>{
                const tr = document.createElement('tr');
                tr.className = "border-b dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700/30 text-xs";
                tr.innerHTML = `
                    <td class="p-2.5 font-bold">${tool.name}</td>
                    <td class="p-2.5"><span class="bg-gray-100 dark:bg-gray-600 px-2 py-0.5 rounded text-[10px] font-bold">${t[tool.category]}</span></td>
                    <td class="p-2.5 max-w-[135px] truncate">${tool.price}</td>
                    <td class="p-2.5 text-center space-x-2">
                        <button onclick="editTool(${tool.id})" class="text-primary font-bold hover:underline">Edit</button>
                        <button onclick="deleteTool(${tool.id})" class="text-red-500 font-bold hover:underline">Delete</button>
                    </td>
                `;
                adminTableBody.appendChild(tr);
            });
        }

        function editTool(id) {
            const t = aiTools.find(item=>item.id === id);
            document.getElementById('toolId').value = t.id;
            document.getElementById('toolName').value = t.name;
            document.getElementById('toolCategory').value = t.category;
            document.getElementById('toolScore').value = t.score;
            document.getElementById('toolPrice').value = t.price;
            document.getElementById('toolLink').value = t.link;
            document.getElementById('toolDesc').value = t.desc;
        }

        function saveTool() {
            const idVal = document.getElementById('toolId').value;
            const nameVal = document.getElementById('toolName').value;
            const linkVal = document.getElementById('toolLink').value;
            if(!nameVal || !linkVal) return alert(i18n[currentLang].alertFields);

            const updatedObj = {
                id: idVal ? parseInt(idVal) : Date.now(),
                name: nameVal,
                category: document.getElementById('toolCategory').value,
                score: parseFloat(document.getElementById('toolScore').value) || 5.0,
                price: document.getElementById('toolPrice').value || "Free",
                link: linkVal,
                desc: document.getElementById('toolDesc').value || ""
            };

            if(idVal) {
                aiTools = aiTools.map(item => item.id === parseInt(idVal) ? updatedObj : item);
            } else { 
                aiTools.push(updatedObj); 
            }

            localStorage.setItem('portal_tools', JSON.stringify(aiTools));
            updateUIStrings();
            renderAdminTable();

            ['toolId','toolName','toolScore','toolPrice','toolLink','toolDesc'].forEach(id => document.getElementById(id).value = '');
        }

        function deleteTool(id) {
            if(!confirm(i18n[currentLang].confirmDel)) return;
            aiTools = aiTools.filter(item => item.id !== id);
            selectedCompare = selectedCompare.filter(item => item.id !== id);
            localStorage.setItem('portal_tools', JSON.stringify(aiTools));
            updateUIStrings();
            renderAdminTable();
        }

        openCompareBtn.addEventListener("click", ()=>{
            compareContent.innerHTML = "";
            selectedCompare.forEach(tool=>{
                const card = document.createElement("div");
                card.className = "bg-gray-50 dark:bg-gray-700/50 p-5 rounded-xl border dark:border-gray-600";
                card.innerHTML = `
                    <h3 class="text-lg font-bold mb-2 dark:text-white">${tool.name}</h3>
                    <p class="text-xs text-gray-600 dark:text-gray-300 mb-4">${tool.desc}</p>
                    <p class="text-xs mb-1 dark:text-white"><strong>${i18n[currentLang].pricing}</strong>${tool.price}</p>
                    <p class="text-xs flex items-center gap-1 dark:text-white"><strong>Rating: </strong>${renderStar(tool.score)} ${tool.score}</p>
                `;
                compareContent.appendChild(card);
            });
            compareModal.classList.replace("hidden", "flex");
        });

        document.getElementById("closeCompare").addEventListener("click", ()=>compareModal.classList.replace("flex", "hidden"));
        document.getElementById("clearSelect").addEventListener("click", ()=>{ selectedCompare = []; compareModal.classList.replace("flex", "hidden"); renderTools(); });
        document.getElementById("closeAdmin").addEventListener("click", ()=>adminModal.classList.replace("flex", "hidden"));

        if(localStorage.getItem("theme") === "dark") document.documentElement.classList.add("dark");
        document.getElementById("themeToggle").addEventListener("click", ()=>{
            document.documentElement.classList.toggle("dark");
            localStorage.setItem("theme", document.documentElement.classList.contains("dark") ? "dark" : "light");
        });

        // Initialize Lifecycle Deployment
        renderLangSelectorUI();
        updateUIStrings();
    </script>
</body>
</html>
