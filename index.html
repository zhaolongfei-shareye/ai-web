<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tools Comparison Portal</title>
    <!-- Tailwind CSS & FontAwesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#4F46E5' } } } }
    </script>
    <style>
        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-6px); box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.15); }
        .star-fill { color: #fbbf24; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-300 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-7xl">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <h1 class="text-[clamp(1.5rem,3vw,2.2rem)] font-bold text-gray-800 dark:text-white flex items-center gap-2">
                <i class="fa fa-rocket text-primary"></i> <span id="navTitle">AI Tools Hub</span>
            </h1>
            <div class="flex flex-wrap items-center gap-3">
                <!-- Language Toggle -->
                <button id="langToggle" class="px-3 py-2 rounded-lg bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-white font-medium text-sm hover:bg-gray-300 dark:hover:bg-gray-600 transition flex items-center gap-1">
                    <i class="fa fa-globe"></i> <span id="langLabel">ZH</span>
                </button>
                <!-- Theme Toggle -->
                <button id="themeToggle" class="px-3 py-2 rounded-lg bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-white text-sm hover:bg-gray-300 dark:hover:bg-gray-600 transition">
                    <i class="fa fa-moon-o dark:hidden"></i><i class="fa fa-sun-o hidden dark:inline"></i>
                </button>
                <!-- Admin Dashboard -->
                <button id="openAdminBtn" class="bg-gray-800 dark:bg-gray-200 text-white dark:text-gray-800 px-4 py-2 rounded-lg hover:opacity-90 transition text-sm flex items-center gap-1">
                    <i class="fa fa-cog"></i> <span id="btnAdmin">Admin</span>
                </button>
                <!-- Compare Trigger -->
                <button id="openCompareBtn" class="bg-primary hover:bg-indigo-700 text-white px-5 py-2 rounded-lg hidden transition shadow-lg shadow-indigo-500/30 text-sm flex items-center gap-1">
                    <i class="fa fa-exchange"></i> <span id="btnCompare">Compare</span>
                </button>
            </div>
        </header>

        <!-- Category Filter Tabs -->
        <div class="flex flex-wrap gap-2 mb-8" id="filterTabs"></div>

        <!-- Cards Container -->
        <div class="grid sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="toolContainer"></div>
    </div>

    <!-- Modal 1: Dual Tool Comparison -->
    <div id="compareModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 rounded-xl w-full max-w-5xl max-h-[90vh] overflow-auto p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-6 border-b dark:border-gray-700 pb-3">
                <h2 class="text-xl font-bold dark:text-white flex items-center gap-2"><i class="fa fa-columns text-primary"></i> <span id="modalCompareTitle">Side-by-Side Comparison</span></h2>
                <button id="closeCompare" class="text-gray-400 hover:text-red-500 text-2xl">&times;</button>
            </div>
            <div class="grid md:grid-cols-2 gap-6" id="compareContent"></div>
            <div class="mt-8 text-center border-t dark:border-gray-700 pt-4">
                <button id="clearSelect" class="px-5 py-2 bg-red-500 text-white rounded-lg text-sm hover:bg-red-600 transition">Clear Selection</button>
            </div>
        </div>
    </div>

    <!-- Modal 2: Admin Password Gateway -->
    <div id="authModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 rounded-xl w-full max-w-md p-6 shadow-2xl">
            <h3 class="text-lg font-bold mb-4 dark:text-white" id="authTitle">Admin Access Required</h3>
            <input type="password" id="authPassword" placeholder="Enter password (Default: 8888)" class="w-full p-2.5 border rounded-lg mb-4 bg-transparent dark:text-white dark:border-gray-600 outline-none focus:border-primary text-sm">
            <div class="flex justify-end gap-2">
                <button id="closeAuth" class="px-4 py-2 text-sm bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-white rounded-lg">Cancel</button>
                <button onclick="verifyPassword()" class="px-4 py-2 text-sm bg-primary text-white rounded-lg hover:opacity-90">Verify</button>
            </div>
        </div>
    </div>

    <!-- Modal 3: Data Management Dashboard -->
    <div id="adminModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 rounded-xl w-full max-w-4xl max-h-[90vh] overflow-auto p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-4 border-b dark:border-gray-700 pb-3">
                <h2 class="text-xl font-bold dark:text-white flex items-center gap-2"><i class="fa fa-dashboard text-primary"></i> <span id="modalAdminTitle">Data Management Console</span></h2>
                <div class="flex items-center gap-3">
                    <button onclick="logoutAdmin()" class="text-xs text-red-500 border border-red-500/30 px-2 py-1 rounded hover:bg-red-500 hover:text-white transition">Logout</button>
                    <button id="closeAdmin" class="text-gray-400 hover:text-red-500 text-2xl">&times;</button>
                </div>
            </div>
            
            <!-- Admin Data Form -->
            <div class="bg-gray-50 dark:bg-gray-700/50 p-4 rounded-xl mb-6 grid sm:grid-cols-3 gap-3 border dark:border-gray-600 text-sm">
                <input type="hidden" id="toolId">
                <div class="flex flex-col"><label class="dark:text-gray-300 mb-1 text-xs">Name / 名称</label><input type="text" id="toolName" class="p-2 border rounded bg-white dark:bg-gray-800 dark:text-white dark:border-gray-600"></div>
                <div class="flex flex-col"><label class="dark:text-gray-300 mb-1 text-xs">Category / 分类</label><select id="toolCategory" class="p-2 border rounded bg-white dark:bg-gray-800 dark:text-white dark:border-gray-600"><option value="chat">Dialogue & Chat</option><option value="image">Image Generation</option><option value="video">Video Generation</option><option value="code">Coding Assistant</option></select></div>
                <div class="flex flex-col"><label class="dark:text-gray-300 mb-1 text-xs">Score / 评分 (0-5.0)</label><input type="number" step="0.1" id="toolScore" class="p-2 border rounded bg-white dark:bg-gray-800 dark:text-white dark:border-gray-600"></div>
                <div class="flex flex-col"><label class="dark:text-gray-300 mb-1 text-xs">Pricing / 费用说明</label><input type="text" id="toolPrice" class="p-2 border rounded bg-white dark:bg-gray-800 dark:text-white dark:border-gray-600"></div>
                <div class="flex flex-col sm:col-span-2"><label class="dark:text-gray-300 mb-1 text-xs">Website URL / 官网链接</label><input type="text" id="toolLink" placeholder="https://..." class="p-2 border rounded bg-white dark:bg-gray-800 dark:text-white dark:border-gray-600"></div>
                <div class="flex flex-col sm:col-span-3"><label class="dark:text-gray-300 mb-1 text-xs">Core Description / 核心功能描述</label><textarea id="toolDesc" class="p-2 border rounded bg-white dark:bg-gray-800 dark:text-white dark:border-gray-600 h-16"></textarea></div>
                <div class="sm:col-span-3 text-right"><button onclick="saveTool()" class="bg-primary text-white px-5 py-2 rounded-lg hover:opacity-90 transition font-medium" id="btnSaveTool">Save Tool</button></div>
            </div>

            <!-- Admin Live Table -->
            <div class="overflow-x-auto text-sm">
                <table class="w-full text-left border-collapse dark:text-white">
                    <thead>
                        <tr class="bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-200">
                            <th class="p-2.5 border dark:border-gray-600">Name</th>
                            <th class="p-2.5 border dark:border-gray-600">Category</th>
                            <th class="p-2.5 border dark:border-gray-600">Pricing</th>
                            <th class="p-2.5 border dark:border-gray-600 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Main Logic Script -->
    <script>
        // Language Pack
        const i18n = {
            en: {
                title: "AI Tools Hub", admin: "Admin Console", compare: "Compare", clear: "Clear Selection",
                pricing: "Pricing: ", visit: "Visit Site", noTools: "No tools found under this category.",
                sideTitle: "Side-by-Side Comparison", dataTitle: "Data Management Console",
                all: "All Tools", chat: "Dialogue & Chat", image: "Image Generation", video: "Video Generation", code: "Coding Assistant",
                authTitle: "Admin Access Required", saveBtn: "Save Tool", alertPass: "Incorrect password!",
                alertSelectLimit: "You can only compare 2 tools at once.", alertFields: "Name and Website URL cannot be empty.",
                confirmDel: "Are you sure you want to delete this tool?", colName:"Name", colCat:"Category", colPrice:"Pricing", colAct:"Actions"
            },
            zh: {
                title: "AI 工具对比库", admin: "管理后台", compare: "开启对比", clear: "清空选择",
                pricing: "费用：", visit: "前往官网", noTools: "该分类下暂无工具。",
                sideTitle: "双工具并排对比", dataTitle: "在线后台数据管理",
                all: "全部工具", chat: "对话聊天", image: "图像生成", video: "视频生成", code: "编程编码",
                authTitle: "管理员身份验证", saveBtn: "保存工具", alertPass: "密码错误！",
                alertSelectLimit: "仅可同时对比两款工具。", alertFields: "名称和网址不能为空。",
                confirmDel: "确定要删除该工具吗？", colName:"名称", colCat:"分类", colPrice:"价格", colAct:"操作"
            }
        };

        // Static Demo Data (Fallback)
        const defaultTools = [
            { id:1, name:"ChatGPT", category:"chat", desc:"Flagship LLM by OpenAI, outstanding for general queries, writing, and logic processing.", price:"Free / $20 mo Plus", score:4.9, link:"https://openai.com" },
            { id:2, name:"Claude 3", category:"chat", desc:"Industry pioneer for massive context analysis, complex file reading, and extreme safety.", price:"Free Tier / Paid Pro", score:4.8, link:"https://anthropic.com" },
            { id:3, name:"Midjourney", category:"image", desc:"Top-tier AI image generator providing unmatched artistic flair and cinematic compositions.", price:"Starts from $10/mo", score:4.7, link:"https://www.midjourney.com" }
        ];

        // State Core
        let currentLang = localStorage.getItem('portal_lang') || 'en';
        let aiTools = JSON.parse(localStorage.getItem('portal_tools')) || defaultTools;
        let selectedCompare = [];
        let currentFilter = "all";

        // Element Selectors
        const toolContainer = document.getElementById("toolContainer");
        const compareModal = document.getElementById("compareModal");
        const compareContent = document.getElementById("compareContent");
        const openCompareBtn = document.getElementById("openCompareBtn");
        const authModal = document.getElementById("authModal");
        const adminModal = document.getElementById("adminModal");
        const adminTableBody = document.getElementById("adminTableBody");
        const filterTabs = document.getElementById("filterTabs");

        // UI Translation Core
        function updateUIStrings() {
            const t = i18n[currentLang];
            document.getElementById("navTitle").innerText = t.title;
            document.getElementById("btnAdmin").innerText = t.admin;
            document.getElementById("btnCompare").innerText = t.compare;
            document.getElementById("langLabel").innerText = currentLang === 'en' ? 'ZH' : 'EN';
            document.getElementById("modalCompareTitle").innerText = t.sideTitle;
            document.getElementById("modalAdminTitle").innerText = t.dataTitle;
            document.getElementById("authTitle").innerText = t.authTitle;
            document.getElementById("btnSaveTool").innerText = t.saveBtn;
            document.getElementById("clearSelect").innerText = t.clear;

            renderFilterTabs();
            renderTools();
        }

        function renderFilterTabs() {
            const categories = ["all", "chat", "image", "video", "code"];
            filterTabs.innerHTML = "";
            categories.forEach(cat => {
                const btn = document.createElement("button");
                btn.className = `px-4 py-2 rounded-lg text-sm transition ${currentFilter === cat ? 'bg-primary text-white font-medium shadow-md' : 'bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-white hover:bg-gray-300 dark:hover:bg-gray-600'}`;
                btn.innerText = i18n[currentLang][cat];
                btn.onclick = () => {
                    currentFilter = cat;
                    renderFilterTabs();
                    renderTools();
                };
                filterTabs.appendChild(btn);
            });
        }

        function renderStar(rating){
            let stars = "";
            for(let i=1;i<=5;i++){
                if(i <= Math.floor(rating)) stars += '<i class="fa fa-star star-fill mr-0.5"></i>';
                else if(i - rating < 1) stars += '<i class="fa fa-star-half-o star-fill mr-0.5"></i>';
                else stars += '<i class="fa fa-star-o text-gray-300 dark:text-gray-600 mr-0.5"></i>';
            }
            return stars;
        }

        function renderTools(){
            toolContainer.innerHTML = "";
            const t = i18n[currentLang];
            const filterData = currentFilter === "all" ? aiTools : aiTools.filter(item=>item.category === currentFilter);
            
            if(filterData.length === 0) {
                toolContainer.innerHTML = `<p class="col-span-full text-center text-gray-400 py-12">${t.noTools}</p>`;
                return;
            }

            filterData.forEach(tool=>{
                const isChecked = selectedCompare.find(s=>s.id === tool.id);
                const card = document.createElement("div");
                card.className = `card-hover bg-white dark:bg-gray-800 rounded-xl shadow-md p-5 border transition-all ${isChecked ? 'border-primary ring-2 ring-primary/20' : 'border-gray-100 dark:border-gray-700'}`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3 gap-2">
                        <h3 class="text-lg font-bold text-gray-800 dark:text-white">${tool.name}</h3>
                        <label class="cursor-pointer">
                            <input type="checkbox" class="compare-checkbox hidden" data-id="${tool.id}" ${isChecked?"checked":""}>
                            <span class="px-2 py-0.5 text-xs rounded border transition ${isChecked ? 'bg-primary text-white border-primary' : 'border-gray-300 text-gray-500'}">${isChecked ? '✓' : '+ '+t.compare}</span>
                        </label>
                    </div>
                    <p class="text-sm text-gray-600 dark:text-gray-300 mb-4 min-h-[60px] line-clamp-3">${tool.desc}</p>
                    <div class="text-xs mb-2"><span class="text-gray-400">${t.pricing}</span><span class="dark:text-white font-medium">${tool.price}</span></div>
                    <div class="flex items-center justify-between mt-4 pt-3 border-t dark:border-gray-700">
                        <div class="flex items-center">${renderStar(tool.score)}</div>
                        <a href="${tool.link}" target="_blank" class="text-xs text-primary font-medium flex items-center gap-1 hover:underline">${t.visit} <i class="fa fa-external-link"></i></a>
                    </div>
                `;
                toolContainer.appendChild(card);
            });
            document.querySelectorAll(".compare-checkbox").forEach(cb=>cb.addEventListener("change", handleSelectCompare));
            openCompareBtn.classList.toggle("hidden", selectedCompare.length !== 2);
        }

        function handleSelectCompare(e){
            const id = parseInt(e.target.dataset.id);
            if(e.target.checked){
                if(selectedCompare.length >= 2) { 
                    alert(i18n[currentLang].alertSelectLimit); 
                    e.target.checked = false; 
                    return; 
                }
                selectedCompare.push(aiTools.find(t=>t.id === id));
            } else {
                selectedCompare = selectedCompare.filter(item=>item.id !== id);
            }
            renderTools();
        }

        // Admin Security Lock Systems
        document.getElementById("openAdminBtn").addEventListener("click", () => {
            if(sessionStorage.getItem("admin_authenticated") === "true") {
                openAdminConsole();
            } else {
                document.getElementById("authPassword").value = "";
                authModal.classList.replace("hidden", "flex");
            }
        });

        document.getElementById("closeAuth").addEventListener("click", () => authModal.classList.replace("flex", "hidden"));

        function verifyPassword() {
            const inputPass = document.getElementById("authPassword").value;
            if(inputPass === "8888") {
                sessionStorage.setItem("admin_authenticated", "true");
                authModal.classList.replace("flex", "hidden");
                openAdminConsole();
            } else {
                alert(i18n[currentLang].alertPass);
            }
        }

        function logoutAdmin() {
            sessionStorage.removeItem("admin_authenticated");
            adminModal.classList.replace("flex", "hidden");
        }

        function openAdminConsole() {
            renderAdminTable();
            adminModal.classList.replace("hidden", "flex");
        }

        // Admin Operational Crud Engine
        function renderAdminTable() {
            adminTableBody.innerHTML = "";
            const t = i18n[currentLang];
            
            // Re-render table head headers based on current language
            const thead = adminModal.querySelector("thead tr");
            thead.innerHTML = `
                <th class="p-2.5 border dark:border-gray-600">${t.colName}</th>
                <th class="p-2.5 border dark:border-gray-600">${t.colCat}</th>
                <th class="p-2.5 border dark:border-gray-600">${t.colPrice}</th>
                <th class="p-2.5 border dark:border-gray-600 text-center">${t.colAct}</th>
            `;

            aiTools.forEach(tool=>{
                const tr = document.createElement('tr');
                tr.className = "border-b dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700/30";
                tr.innerHTML = `
                    <td class="p-2.5 font-medium">${tool.name}</td>
                    <td class="p-2.5"><span class="bg-gray-100 dark:bg-gray-600 px-2 py-0.5 rounded text-xs">${t[tool.category]}</span></td>
                    <td class="p-2.5 max-w-[150px] truncate">${tool.price}</td>
                    <td class="p-2.5 text-center space-x-3">
                        <button onclick="editTool(${tool.id})" class="text-primary hover:underline">Edit</button>
                        <button onclick="deleteTool(${tool.id})" class="text-red-500 hover:underline">Delete</button>
                    </td>
                `;
                adminTableBody.appendChild(tr);
            });
        }

        function editTool(id) {
            const t = aiTools.find(item=>item.id === id);
            document.getElementById('toolId').value = t.id;
            document.getElementById('toolName').value = t.name;
            document.getElementById('toolCategory').value = t.category;
            document.getElementById('toolScore').value = t.score;
            document.getElementById('toolPrice').value = t.price;
            document.getElementById('toolLink').value = t.link;
            document.getElementById('toolDesc').value = t.desc;
        }

        function saveTool() {
            const idVal = document.getElementById('toolId').value;
            const nameVal = document.getElementById('toolName').value;
            const linkVal = document.getElementById('toolLink').value;
            if(!nameVal || !linkVal) return alert(i18n[currentLang].alertFields);

            const updatedObj = {
                id: idVal ? parseInt(idVal) : Date.now(),
                name: nameVal,
                category: document.getElementById('toolCategory').value,
                score: parseFloat(document.getElementById('toolScore').value) || 5.0,
                price: document.getElementById('toolPrice').value || "Free",
                link: linkVal,
                desc: document.getElementById('toolDesc').value || ""
            };

            if(idVal) {
                aiTools = aiTools.map(item => item.id === parseInt(idVal) ? updatedObj : item);
            } else { 
                aiTools.push(updatedObj); 
            }

            localStorage.setItem('portal_tools', JSON.stringify(aiTools));
            updateUIStrings();
            renderAdminTable();

            // Form Purge Reset
            ['toolId','toolName','toolScore','toolPrice','toolLink','toolDesc'].forEach(id => document.getElementById(id).value = '');
        }

        function deleteTool(id) {
            if(!confirm(i18n[currentLang].confirmDel)) return;
            aiTools = aiTools.filter(item => item.id !== id);
            selectedCompare = selectedCompare.filter(item => item.id !== id);
            localStorage.setItem('portal_tools', JSON.stringify(aiTools));
            updateUIStrings();
            renderAdminTable();
        }

        // Inter-modal Actions
        openCompareBtn.addEventListener("click", ()=>{
            compareContent.innerHTML = "";
            selectedCompare.forEach(tool=>{
                const card = document.createElement("div");
                card.className = "bg-gray-50 dark:bg-gray-700/50 p-5 rounded-xl border dark:border-gray-600";
                card.innerHTML = `
                    <h3 class="text-xl font-bold mb-2 dark:text-white">${tool.name}</h3>
                    <p class="text-sm text-gray-600 dark:text-gray-300 mb-4">${tool.desc}</p>
                    <p class="text-sm mb-1 dark:text-white"><strong>${i18n[currentLang].pricing}</strong>${tool.price}</p>
                    <p class="text-sm flex items-center gap-1 dark:text-white"><strong>Rating: </strong>${renderStar(tool.score)} ${tool.score}</p>
                `;
                compareContent.appendChild(card);
            });
            compareModal.classList.replace("hidden", "flex");
        });

        document.getElementById("closeCompare").addEventListener("click", ()=>compareModal.classList.replace("flex", "hidden"));
        document.getElementById("clearSelect").addEventListener("click", ()=>{ selectedCompare = []; compareModal.classList.replace("flex", "hidden"); renderTools(); });
        document.getElementById("closeAdmin").addEventListener("click", ()=>adminModal.classList.replace("flex", "hidden"));

        // Global Event Triggers (Language & Theme)
        document.getElementById("langToggle").addEventListener("click", () => {
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            localStorage.setItem('portal_lang', currentLang);
            updateUIStrings();
        });

        if(localStorage.getItem("theme") === "dark") document.documentElement.classList.add("dark");
        document.getElementById("themeToggle").addEventListener("click", ()=>{
            document.documentElement.classList.toggle("dark");
            localStorage.setItem("theme", document.documentElement.classList.contains("dark") ? "dark" : "light");
        });

        // Initialize Screen Engine
        updateUIStrings();
    </script>
</body>
</html>
